<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CikguSync · A4a prototype</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Tokens defined in CIKGUSYNC_REDESIGN.md §1.1.
       No gradients, no shadows (except the bottom-nav top hairline). */
    :root,
    body[data-theme="light"] {
      --navy-900:   #0B2A4A;
      --navy-800:   #13325A;
      --navy-700:   #1E4172;
      --ink-900:    #0F172A;
      --ink-700:    #334155;
      --ink-500:    #64748B;
      --ink-300:    #CBD5E1;
      --line-200:   #E5E7EB;
      --surface-0:  #FFFFFF;
      --surface-50: #F7F8FA;
      --surface-100:#F1F3F6;
      --peach-500:  #E78A3C;
      --peach-200:  #FCE3CB;
      --peach-50:   #FFF6EC;
      --green-600:  #1F8A5B;
      --green-100:  #DCF1E5;
      --red-500:    #D14343;
      --red-100:    #FBE0E0;
      /* Legacy aliases so any not-yet-migrated code keeps working visually.
         Anything new should reference the spec names above. */
      --cs-bg:       var(--surface-50);
      --cs-bg2:      var(--surface-100);
      --cs-bg3:      var(--surface-100);
      --cs-card:     var(--surface-0);
      --cs-card-elev:var(--surface-0);
      --cs-border:   var(--line-200);
      --cs-border-strong: var(--ink-300);
      --cs-text:     var(--ink-900);
      --cs-text-2:   var(--ink-700);
      --cs-text-3:   var(--ink-500);
      --cs-navy:     var(--navy-900);
      --cs-navy-dark:var(--navy-800);
      --cs-navy-deep:var(--navy-900);
      --cs-navy-soft:#EAF0F8;
      --cs-teal:     var(--navy-700);
      --cs-teal-dark:var(--navy-800);
      --cs-teal-soft:var(--surface-100);
      --cs-success:  var(--green-600);
      --cs-success-soft: var(--green-100);
      --cs-warn:     var(--peach-500);
      --cs-warn-soft:var(--peach-200);
      --cs-queue:    var(--peach-500);
      --cs-queue-soft: var(--peach-200);
      --cs-danger:   var(--red-500);
      --cs-danger-soft: var(--red-100);
      /* Shadows neutralised per spec (only the bottom-nav hairline survives). */
      --cs-shadow-1: none;
      --cs-shadow-2: none;
      --cs-shadow-3: none;
      --cs-logo-shadow: none;
    }
    /* Dim mode kept disabled by spec — single light theme. */
    body[data-theme="dim"] {
      --surface-50: #0E1A24;
      --surface-0:  #14222F;
      --surface-100:#1A2A38;
      --line-200:   #25394C;
      --ink-900:    #E7EEF5;
      --ink-700:    #B1C0CF;
      --ink-500:    #7E94A9;
      --navy-900:   #4FA8D8;
      --navy-800:   #2E89BC;
      --navy-700:   #1B6BA0;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--surface-50);
      color: var(--ink-900);
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }
    #__loading { position: fixed; bottom: 18px; right: 18px; font: 12px/1.4 'JetBrains Mono', monospace; color: var(--cs-text-3); background: var(--cs-card); padding: 6px 12px; border-radius: 999px; border: 1px solid var(--cs-border); z-index: 10000; }
    #__loading.hidden { display: none; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--cs-border-strong); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: var(--cs-text-3); border: 2px solid transparent; background-clip: padding-box; }
  </style>
</head>
<body data-theme="light">
  <div id="root"></div>
  <div id="__loading">loading…</div>
  <div id="__err" style="display:none;position:fixed;top:0;left:0;right:0;background:#fee;border-bottom:1px solid #c44;color:#900;font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 14px;z-index:99999;white-space:pre-wrap;max-height:60vh;overflow:auto"></div>

  <script>
    window.__resources = { logo: 'assets/logo.png' };
    // Surface any uncaught error or Babel transform failure so the page is debuggable.
    (function() {
      var box = document.getElementById('__err');
      function show(msg) {
        if (!box) box = document.getElementById('__err');
        if (!box) return;
        box.style.display = 'block';
        box.textContent = (box.textContent ? box.textContent + '\n\n' : '') + msg;
      }
      window.addEventListener('error', function(e) {
        var src = e.filename ? ' (' + e.filename.split('/').pop() + ':' + e.lineno + ':' + e.colno + ')' : '';
        show('[error] ' + (e.message || e.type) + src);
      });
      window.addEventListener('unhandledrejection', function(e) {
        show('[promise] ' + (e.reason && (e.reason.message || e.reason)));
      });
    })();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <script>
    // Expose React + hooks on window so the .jsx files can use them without
    // imports. We avoid top-level `const useState = …` because teacher.jsx
    // already declares its own `const { useState } = React;` and two scripts
    // declaring the same lexical binding at top level throws
    // "Can't create duplicate variable" in the shared script-realm.
    window.React = React;
    window.ReactDOM = ReactDOM;
    window.useState   = React.useState;
    window.useEffect  = React.useEffect;
    window.useRef     = React.useRef;
    window.useMemo    = React.useMemo;
    window.useCallback= React.useCallback;
  </script>

  <!-- Manual loader: fetch each .jsx, transform with Babel, eval inline.
       This surfaces real error messages instead of the "Script error." mask
       you get with <script type="text/babel" src="…"> when the dev server is
       cross-origin from the eval'd code. -->
  <script>
    (async function loadJsx() {
      var box = document.getElementById('__err');
      function show(msg) {
        if (!box) box = document.getElementById('__err');
        if (!box) return;
        box.style.display = 'block';
        box.textContent = (box.textContent ? box.textContent + '\n\n' : '') + msg;
      }
      var files = [
        'theme.jsx',
        'components.jsx',
        'teacher.jsx',
        'teacher-detail.jsx',
        'screens-extra.jsx',
        'leader.jsx',
        'district.jsx',
        'app.jsx',
      ];
      for (var i = 0; i < files.length; i++) {
        var f = files[i];
        try {
          var src = await (await fetch(f + '?ts=' + Date.now())).text();
          var out = Babel.transform(src, {
            presets: ['env', 'react'],
            filename: f,
            sourceMaps: 'inline',
            sourceFileName: f,
          }).code;
          // Eval as a script with the original filename so DevTools shows it.
          var blob = new Blob([out + '\n//# sourceURL=' + f], { type: 'application/javascript' });
          await new Promise(function (resolve, reject) {
            var s = document.createElement('script');
            s.onload = resolve;
            s.onerror = function (e) { reject(new Error('Eval failed for ' + f)); };
            s.src = URL.createObjectURL(blob);
            document.body.appendChild(s);
          });
        } catch (e) {
          show('[' + f + '] ' + (e && (e.message || e)));
          throw e;
        }
      }
    })();
  </script>

  <script>
    const tryHide = () => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        const l = document.getElementById('__loading');
        if (l) l.classList.add('hidden');
        return true;
      }
      return false;
    };
    let n = 0;
    const t = setInterval(() => { if (tryHide() || ++n > 60) clearInterval(t); }, 200);
  </script>
</body>
</html>
